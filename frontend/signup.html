<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your Curry Time account to manage reservations and personalise your dining experience.">
  <link rel="icon" href="img/brand/Logo.png" type="image/png">
  <title>Sign Up — Curry Time</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(145deg, #25150A 0%, #5C2A0E 55%, #8B3A10 100%);
    }
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
    }
    body::before { width: 500px; height: 500px; background: rgba(245,166,35,0.05); top: -120px; right: -100px; }
    body::after  { width: 350px; height: 350px; background: rgba(192,82,42,0.08); bottom: -80px; left: -80px; }

    .signup-page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .signup-card {
      background: rgba(255, 255, 255, 0.06);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 480px;
      padding: 44px 40px;
    }

    /* Brand */
    .signup-brand {
      text-align: center;
      margin-bottom: 28px;
    }
    .signup-brand a {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-family: var(--font-serif);
      font-size: 1.75rem;
      font-style: italic;
      color: var(--clr-accent);
    }
    .signup-brand a span { color: rgba(255,255,255,0.85); font-style: normal; }
    .signup-brand p { color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-top: 8px; }

    .signup-title { font-size: 1.3rem; color: var(--clr-white); margin-bottom: 22px; }

    /* Step indicator */
    .step-dots {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 24px;
    }
    .step-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transition: var(--transition);
    }
    .step-dot.active { background: var(--clr-accent); width: 24px; border-radius: 4px; }

    /* Form row for two columns */
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* Dark context overrides */
    .signup-card .form-group label { color: rgba(255,255,255,0.75); }
    .signup-card .form-group input {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
      color: var(--clr-white);
    }
    .signup-card .form-group input::placeholder { color: rgba(255,255,255,0.3); }
    .signup-card .form-group input:focus {
      border-color: var(--clr-accent);
      box-shadow: 0 0 0 3px rgba(245,166,35,0.18);
      background: rgba(255,255,255,0.12);
    }

    /* Password strength bar */
    .password-hints { margin-top: 8px; display: flex; gap: 4px; }
    .hint-bar {
      flex: 1;
      height: 3px;
      border-radius: 2px;
      background: rgba(255,255,255,0.12);
    }
    .hint-label {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.35);
      margin-top: 5px;
    }

    /* Terms */
    .terms-group {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 20px;
    }
    .terms-group input[type="checkbox"] {
      accent-color: var(--clr-accent);
      width: 16px; height: 16px;
      flex-shrink: 0;
      margin-top: 2px;
      cursor: pointer;
    }
    .terms-group label {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      line-height: 1.5;
    }
    .terms-group label a { color: var(--clr-accent); }
    .terms-group label a:hover { text-decoration: underline; }

    /* Submit */
    .signup-submit .btn { display: block; width: 100%; text-align: center; }

    /* Divider */
    .signup-divider {
      text-align: center;
      margin: 20px 0;
      position: relative;
      color: rgba(255,255,255,0.3);
      font-size: 0.82rem;
    }
    .signup-divider::before,
    .signup-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      height: 1px;
      width: calc(50% - 24px);
      background: rgba(255,255,255,0.12);
    }
    .signup-divider::before { left: 0; }
    .signup-divider::after  { right: 0; }

    /* Footer links */
    .signin-prompt { text-align: center; font-size: 0.88rem; color: rgba(255,255,255,0.5); }
    .signin-prompt a { color: var(--clr-accent); font-weight: 600; }
    .signin-prompt a:hover { text-decoration: underline; }

    .signup-back {
      text-align: center;
      margin-top: 20px;
    }
    .signup-back a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.4);
      transition: var(--transition);
    }
    .signup-back a:hover { color: rgba(255,255,255,0.75); }

    @media (max-width: 540px) {
      .signup-card  { padding: 32px 22px; }
      .form-row     { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="signup-page">
  <div class="signup-card">

    <!-- Brand -->
    <div class="signup-brand">
      <a href="index.html">
        <img src="img/brand/Logo.png" alt="Curry Time" class="brand-icon">
        <em>Curry</em> <span>Time</span>
      </a>
      <p>Create your free account</p>
    </div>

    <!-- Progress dots (decorative) -->
    <div class="step-dots" aria-hidden="true">
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
      <div class="step-dot"></div>
    </div>

    <h1 class="signup-title">Join Curry Time</h1>

    <form id="signup-form" action="#" method="post" novalidate>

      <!-- Name row -->
      <div class="form-row">
        <div class="form-group">
          <label for="first-name">First Name</label>
          <input
            type="text"
            id="first-name"
            name="first_name"
            placeholder="e.g. Priya"
            autocomplete="given-name"
            required
          >
        </div>
        <div class="form-group">
          <label for="last-name">Last Name</label>
          <input
            type="text"
            id="last-name"
            name="last_name"
            placeholder="e.g. Sharma"
            autocomplete="family-name"
            required
          >
        </div>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          autocomplete="email"
          required
        >
      </div>

      <!-- Phone -->
      <div class="form-group">
        <label for="phone">Phone Number <span class="label-optional">(optional)</span></label>
        <input
          type="tel"
          id="phone"
          name="phone"
          placeholder="e.g. 9876543210"
          autocomplete="tel"
        >
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Minimum 8 characters"
          autocomplete="new-password"
          minlength="8"
          required
        >
        <div class="password-hints" aria-hidden="true">
          <div class="hint-bar"></div>
          <div class="hint-bar"></div>
          <div class="hint-bar"></div>
          <div class="hint-bar"></div>
        </div>
        <p class="hint-label">Use 8+ characters with letters, numbers &amp; symbols</p>
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <input
          type="password"
          id="confirm-password"
          name="confirm_password"
          placeholder="Repeat your password"
          autocomplete="new-password"
          required
        >
      </div>

      <!-- Terms -->
      <div class="terms-group">
        <input type="checkbox" id="terms" name="terms" required>
        <label for="terms">
          I agree to the <a href="#">Terms &amp; Conditions</a> and <a href="#">Privacy Policy</a>
        </label>
      </div>

      <!-- Submit -->
      <div class="signup-submit">
        <button type="submit" class="btn btn-primary btn-lg">Create Account</button>
      </div>

    </form>

    <div class="signup-divider">or</div>

    <p class="signin-prompt">
      Already have an account? <a href="login.html">Sign in</a>
    </p>

    <div class="signup-back">
      <a href="index.html">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
        Back to home
      </a>
    </div>

  </div>
</div>

<script src="js/toast.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
